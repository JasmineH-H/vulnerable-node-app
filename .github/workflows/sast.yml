name: SAST Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sast:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout target repo
      - name: Checkout vulnerable node repo
        uses: actions/checkout@v4

      # 2. Checkout scanner repo
      - name: Checkout scanner repo
        uses: actions/checkout@v4
        with:
          repository: JasmineH-H/SAST-Pentest-Tool
          path: SAST-Pentest-Tool

      # 3. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # 4. Install scanner dependencies
      - name: Install SAST scanner dependencies
        working-directory: ./SAST-Pentest-Tool/sast/backend
        run: npm install

      # 5. Start scanner
      - name: Start SAST scanner
        working-directory: ./SAST-Pentest-Tool/sast/backend
        run: |
          node server.js > scanner.log 2>&1 &
          echo $! > scanner.pid

      # 6. Wait for scanner ready
      - name: Wait for scanner to become ready
        run: |
          for i in {1..20}; do
            if curl -sf http://localhost:3000/health > /dev/null; then
              echo "Scanner is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Scanner failed to start"
          cat SAST-Pentest-Tool/sast/backend/scanner.log || true
          exit 1

      # 7. Run scan
      - name: Scan repository
        run: |
          curl -sS -X POST http://localhost:3000/scan/directory \
            -H "Content-Type: application/json" \
            -d '{"dirpath":"./"}' \
            -o sast-result.json

      # 8. print result
      - name: Show result
        run: python3 -m json.tool sast-result.json

      # 9. Upload result ALWAYS
      - name: Upload SAST result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-result
          path: sast-result.json

      # 10. Fail only on HIGH or MEDIUM
      - name: Enforce SAST policy (fail on HIGH or MEDIUM)
        run: |
          python3 - <<'PY'
          import json, sys

          with open("sast-result.json") as f:
              data = json.load(f)

          summary = data.get("summary", {})
          high = summary.get("high", 0)
          medium = summary.get("medium", 0)
          low = summary.get("low", 0)

          print(f"HIGH: {high}, MEDIUM: {medium}, LOW: {low}")

          if high > 0 or medium > 0:
              print("SAST FAILED: High or Medium vulnerabilities detected")
              sys.exit(1)
          else:
              print("SAST PASSED: Only low or no vulnerabilities")
          PY

      # 11. Stop scanner
      - name: Stop scanner
        if: always()
        run: |
          kill $(cat SAST-Pentest-Tool/sast/backend/scanner.pid) || true